#!/usr/bin/env bash
# ops.conf — Centralized configuration for all SoloFrameHub operations scripts
# Source this file at the top of every ops script: source "$(dirname "$0")/ops.conf"

# ============================================================================
# GENERAL
# ============================================================================
OPS_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
OPS_LOG_DIR="/var/log/ops"
OPS_STATE_DIR="/var/run/ops"
OPS_HOSTNAME="soloframehub-vps"

# ============================================================================
# BACKUP CONFIGURATION
# ============================================================================
BACKUP_LOCAL_DIR="/backups"
LOCAL_RETENTION_DAYS=7
OFFSITE_RETENTION_DAYS=30

# S3/R2 offsite storage (set these on VPS or in /root/.ops-secrets)
# S3_ENDPOINT=""          # e.g. https://<account>.r2.cloudflarestorage.com
# S3_ACCESS_KEY=""
# S3_SECRET_KEY=""
# S3_BUCKET="soloframehub-backups"
# S3_REGION="auto"

# ============================================================================
# ALERTING (Resend API)
# ============================================================================
# RESEND_API_KEY=""       # Set on VPS or in /root/.ops-secrets
ALERT_FROM="SoloFrameHub Ops <ops@soloframehub.com>"
ALERT_TO=""               # Set to your email address
RESEND_API_URL="https://api.resend.com/emails"

# ============================================================================
# DOKPLOY CONTAINER NAMES (stable appName prefixes from Dokploy)
# These are used with: docker ps --filter "name=<prefix>"
# ============================================================================

# --- CAA Project ---
CAA_APP_CONTAINER="app-override-solid-state-panel-yi3kgd"
CAA_PG_CONTAINER="postgres-reboot-solid-state-capacitor-t3yd18"
CAA_REDIS_CONTAINER="redis-parse-neural-application-r4m6uv"
CAA_MINIO_COMPOSE="compose-index-open-source-sensor-4r72s9"

# --- MHE Project ---
MHE_APP_CONTAINER="app-generate-haptic-sensor-jmmico"
MHE_PG_CONTAINER="postgres-calculate-redundant-microchip-tfjt65"

# --- Business Apps Project (compose services) ---
GHOST_COMPOSE="ghost"
NODEBB_COMPOSE="nodebb"
METABASE_COMPOSE="metabase"
LISTMONK_COMPOSE="listmonk"
N8N_COMPOSE="n8n"
TYPEBOT_COMPOSE="typebot"
HEYFORM_COMPOSE="heyform"

# ============================================================================
# DATABASE CREDENTIALS (set on VPS or in /root/.ops-secrets)
# These are the credentials used INSIDE the Docker containers
# ============================================================================
# CAA_PG_USER="postgres"
# CAA_PG_DB="postgres"
# MHE_PG_USER="postgres"
# MHE_PG_DB="postgres"

# Defaults (used if not overridden)
DEFAULT_PG_USER="postgres"
DEFAULT_PG_DB="postgres"

# ============================================================================
# HEALTH CHECK ENDPOINTS
# ============================================================================
declare -A HEALTH_URLS
HEALTH_URLS=(
  [caa]="https://ai-solo-gtm-os.soloframehub.com/api/health"
  [mhe]="https://mental-health-education.soloframehub.com"
  [blog]="https://blog.soloframehub.com"
  [forum]="https://ai-caa-forum.soloframehub.com"
  [metabase]="https://metabase.soloframehub.com"
  [listmonk]="https://listmonk.soloframehub.com"
  [n8n]="https://n8n.soloframehub.com"
  [typebot]="https://typebot.soloframehub.com"
  [forms]="https://forms.soloframehub.com"
)

# ============================================================================
# THRESHOLDS
# ============================================================================
DISK_WARN_PERCENT=85
MEMORY_WARN_PERCENT=90
CERT_EXPIRY_WARN_DAYS=14
BACKUP_STALE_HOURS=26
HEALTH_CHECK_TIMEOUT=10       # seconds per HTTP check
HEALTH_DEBOUNCE_COUNT=2       # consecutive failures before alerting
HEALTH_ALERT_COOLDOWN=3600    # seconds between alerts per service

# ============================================================================
# EXPECTED CONTAINERS (for health check — all containers that should be running)
# ============================================================================
EXPECTED_CONTAINERS=(
  "$CAA_APP_CONTAINER"
  "$CAA_PG_CONTAINER"
  "$CAA_REDIS_CONTAINER"
  "$MHE_APP_CONTAINER"
  "$MHE_PG_CONTAINER"
)

# ============================================================================
# LOAD SECRETS (override any values above with local secrets file)
# ============================================================================
SECRETS_FILE="/root/.ops-secrets"
if [[ -f "$SECRETS_FILE" ]]; then
  # shellcheck source=/dev/null
  source "$SECRETS_FILE"
fi
