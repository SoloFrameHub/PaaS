version: '3.8'

services:
  maia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maia-classifier
    restart: always
    # No `ports:` — reachability is via the dokploy-network overlay DNS
    # (`http://maia:8001`). Publishing 8001 to the host with no auth +
    # `allow_origins=["*"]` makes the classifier publicly reachable if
    # the host firewall ever opens the port (B-050).
    expose:
      - "8001"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 2G

networks:
  dokploy-network:
    external: true
