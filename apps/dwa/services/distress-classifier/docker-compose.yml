version: '3.8'

services:
  distress-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mental-health-classifier
    restart: unless-stopped
    # Local dev: bind to loopback only so the classifier is reachable from
    # the host's Next.js app but not from the LAN. Prod uses the overlay
    # network (see docker-compose-dokploy.yml). (B-050)
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    labels:
      - "com.dokploy.service=distress-classifier"
      - "com.dokploy.project=mental-health-education"
