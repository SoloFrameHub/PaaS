name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Blueprint §11 required PR checks:
#   1. dependency-cruiser graph clean
#   2. Tenant-leak harness green  (pending: requires live Postgres — wired in a follow-up job)
#   3. Manifest lint green for any touched verticals/*
#   4. Type check + unit test for every changed package
#   5. Migration dry-run on ephemeral Postgres if any infra/migrations/ change
#   6. CODEOWNERS approval  (GitHub branch protection setting; not a CI job)

jobs:
  check:
    name: build · typecheck · test · depcruise
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Dependency graph
        run: pnpm depcruise

      - name: Lint
        run: pnpm lint

  migrations:
    name: migrations apply cleanly
    runs-on: ubuntu-latest
    # Blueprint §11 check 5 — only run when migrations change (cheap + clear).
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: test
          POSTGRES_DB: solofame_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Check if migrations changed
        id: changed
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^infra/migrations/'; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply migrations in order
        if: steps.changed.outputs.run == 'true'
        env:
          PGPASSWORD: test
        run: |
          for f in infra/migrations/*.sql; do
            echo "=== applying $f ==="
            psql -h localhost -U app_user -d solofame_test -v ON_ERROR_STOP=1 -f "$f"
          done
