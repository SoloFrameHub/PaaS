name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Mirrors the pre-commit hook in .git/hooks/pre-commit — a developer who
# runs `git commit --no-verify` or pushes from a machine without the hook
# installed still gets caught here. Config lives in .gitleaks.toml at
# repo root.

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan the diff range on PRs
          # (default shallow clone misses older commits in a long PR).
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use our repo-root config (allowlist for MDX lesson content,
          # API doc placeholders, GA4 IDs, Firebase web keys).
          GITLEAKS_CONFIG: .gitleaks.toml
          # Fail the job if any leak is detected.
          GITLEAKS_ENABLE_SUMMARY: true
